# Run Pro Response with Docker Compose.
#   1. cp .env.example .env  &&  fill in your tokens
#   2. docker compose up --build
services:
  proresponse:
    build: .
    image: pro-response-for-slackbot:2.0.0
    restart: unless-stopped
    env_file: .env
    # Only needed when SLACK_MODE=http (Socket Mode needs no inbound port).
    ports:
      - "3000:3000"
